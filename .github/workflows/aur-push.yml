name: Auto-Update and Push to AUR

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-check:
    runs-on: ubuntu-latest
    container: 
      image: archlinux:latest
      options: --user root
    steps:
      - name: Install System Dependencies
        run: |
          pacman -Syu --noconfirm git base-devel openssh curl sudo

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new version
        id: check_version
        run: |
          # 1. Get current version from PKGBUILD
          OLD_VER=$(grep -oP 'pkgver=\K[0-9.]+' PKGBUILD)
          echo "Local PKGBUILD version: $OLD_VER"
          
          # 2. Scrape the website with a User-Agent (to avoid bot detection)
          # We save it to a file first for debugging if it fails
          curl -sL -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" https://squidservers.com/download > site_source.html
          
          # Try to extract the version
          NEW_VER=$(grep -oP 'Latest Version v\K[0-9.]+' site_source.html | head -1)
          
          echo "Scraped version: '$NEW_VER'"

          if [ -z "$NEW_VER" ]; then
            echo "--- DEBUG: WEBSITE CONTENT START ---"
            cat site_source.html | head -n 50
            echo "--- DEBUG: WEBSITE CONTENT END ---"
            echo "Error: Could not find version on website."
            exit 1
          fi

          if [ "$OLD_VER" != "$NEW_VER" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VER" >> $GITHUB_OUTPUT
            sed -i "s/pkgver=$OLD_VER/pkgver=$NEW_VER/" PKGBUILD
            echo "Update found! New version is $NEW_VER"
          else
            echo "No update needed. Site is still on $NEW_VER"
          fi

      - name: Update Checksums and .SRCINFO
        if: steps.check_version.outputs.version_changed == 'true'
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder .
          sudo -u builder bash -c "updpkgsums && makepkg --printsrcinfo > .SRCINFO"

      - name: Push to GitHub and AUR
        if: steps.check_version.outputs.version_changed == 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          eval $(ssh-agent -s)
          echo "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
          git config --global user.name "SquidServers Bot"
          git config --global user.email "bot@github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add PKGBUILD .SRCINFO
          git commit -m "Auto-update to ${{ steps.check_version.outputs.new_version }}"
          git push origin main
          git remote add aur ssh://aur@aur.archlinux.org/squidservers-bin.git
          git push aur main:master --force