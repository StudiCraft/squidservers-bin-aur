name: SquidServers Hybrid Update

on:
  schedule:
    - cron: '0 0 * * 1'
  pull_request:
    paths:
      - 'PKGBUILD'
  workflow_dispatch:
    inputs:
      version:
        description: 'Force a specific version (e.g. 1.5.6)'
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    container: archlinux:latest
    timeout-minutes: 350
    permissions:
      contents: write

    steps:
      - name: Install System Dependencies
        run: pacman -Syu --noconfirm git base-devel openssh curl sudo pacman-contrib

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Target Version
        id: target
        run: |
          OLD_VER=$(grep -oP 'pkgver=\K[0-9.]+' PKGBUILD)
          echo "Current version: $OLD_VER"

          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "update_found=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "version=$OLD_VER" >> $GITHUB_OUTPUT
            echo "update_found=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CDN="https://cdn.squidservers.com"

          probe() {
            curl --output /dev/null --silent --head --fail \
              --connect-timeout 3 \
              --max-time 5 \
              "${CDN}/squidservers_${1}_amd64.deb"
          }

          is_newer() {
            [ "$(printf '%s\n' "$1" "$2" | sort -V | tail -1)" = "$1" ] \
              && [ "$1" != "$2" ]
          }

          MAJOR=$(echo "$OLD_VER" | cut -d. -f1)
          MINOR=$(echo "$OLD_VER" | cut -d. -f2)
          PATCH=$(echo "$OLD_VER" | cut -d. -f3)
          MAX_MISS_PATCH=20
          MAX_MISS_MINOR=10
          MAX_MISS_MAJOR=3
          BEST=""

          echo "--- Patch axis (max $MAX_MISS_PATCH consecutive misses) ---"
          miss=0
          p=$((PATCH + 1))
          while [ $miss -lt $MAX_MISS_PATCH ]; do
            V="$MAJOR.$MINOR.$p"
            if probe "$V"; then
              is_newer "$V" "${BEST:-$OLD_VER}" && BEST="$V"
              echo "  ✓ $V"
              miss=0
            else
              echo "  ✗ $V"
              miss=$((miss + 1))
            fi
            p=$((p + 1))
          done
          echo "[Patch axis exhausted — $MAX_MISS_PATCH consecutive misses]"

          echo "--- Minor axis (max $MAX_MISS_MINOR consecutive empty minors) ---"
          minor_miss=0
          m=$((MINOR + 1))
          while [ $minor_miss -lt $MAX_MISS_MINOR ]; do
            echo "  [minor $MAJOR.$m.x]"
            minor_had_hit=0
            miss=0; p=0
            while [ $miss -lt $MAX_MISS_PATCH ]; do
              V="$MAJOR.$m.$p"
              if probe "$V"; then
                is_newer "$V" "${BEST:-$OLD_VER}" && BEST="$V"
                echo "    ✓ $V"
                miss=0; minor_had_hit=1
              else
                echo "    ✗ $V"
                miss=$((miss + 1))
              fi
              p=$((p + 1))
            done
            if [ $minor_had_hit -eq 0 ]; then
              minor_miss=$((minor_miss + 1))
              echo "  [minor $MAJOR.$m empty — minor_miss=$minor_miss]"
            else
              minor_miss=0
              echo "  [minor $MAJOR.$m had hits — minor_miss reset to 0]"
            fi
            m=$((m + 1))
          done
          echo "[Minor axis exhausted — $MAX_MISS_MINOR consecutive empty minors]"

          echo "--- Major axis (max $MAX_MISS_MAJOR consecutive empty majors) ---"
          major_miss=0
          mj=$((MAJOR + 1))
          while [ $major_miss -lt $MAX_MISS_MAJOR ]; do
            echo "  [major $mj.x.x]"
            major_had_hit=0
            minor_miss=0; m=0
            while [ $minor_miss -lt $MAX_MISS_MINOR ]; do
              echo "    [minor $mj.$m.x]"
              minor_had_hit=0
              miss=0; p=0
              while [ $miss -lt $MAX_MISS_PATCH ]; do
                V="$mj.$m.$p"
                if probe "$V"; then
                  is_newer "$V" "${BEST:-$OLD_VER}" && BEST="$V"
                  echo "      ✓ $V"
                  miss=0; minor_had_hit=1; major_had_hit=1
                else
                  echo "      ✗ $V"
                  miss=$((miss + 1))
                fi
                p=$((p + 1))
              done
              if [ $minor_had_hit -eq 0 ]; then
                minor_miss=$((minor_miss + 1))
                echo "    [minor $mj.$m empty — minor_miss=$minor_miss]"
              else
                minor_miss=0
                echo "    [minor $mj.$m had hits — minor_miss reset to 0]"
              fi
              m=$((m + 1))
            done
            if [ $major_had_hit -eq 0 ]; then
              major_miss=$((major_miss + 1))
              echo "  [major $mj empty — major_miss=$major_miss]"
            else
              major_miss=0
              echo "  [major $mj had hits — major_miss reset to 0]"
            fi
            mj=$((mj + 1))
          done
          echo "[Major axis exhausted — $MAX_MISS_MAJOR consecutive empty majors]"

          echo "--- Sweep complete ---"
          if [ -n "$BEST" ]; then
            echo "Found new version: $BEST"
            echo "version=$BEST" >> $GITHUB_OUTPUT
            echo "update_found=true" >> $GITHUB_OUTPUT
          else
            echo "No new version found."
            echo "update_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Update PKGBUILD and Checksums
        if: steps.target.outputs.update_found == 'true'
        run: |
          NEW_VER=${{ steps.target.outputs.version }}
          sed -i "s/pkgver=.*/pkgver=$NEW_VER/" PKGBUILD
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder .
          sudo -u builder bash -c "updpkgsums && makepkg --printsrcinfo > .SRCINFO"

      - name: Push to GitHub
        if: steps.target.outputs.update_found == 'true' && github.event_name != 'pull_request'
        run: |
          git config --global user.name "SquidServers Bot"
          git config --global user.email "bot@github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.target.outputs.version }}"
          git push origin main --force

      - name: Push to AUR
        if: steps.target.outputs.update_found == 'true' && github.event_name != 'pull_request'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          eval $(ssh-agent -s)
          echo "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          ssh-keyscan -t ed25519 aur.archlinux.org >> /root/.ssh/known_hosts
          chmod 600 /root/.ssh/known_hosts
          git clone ssh://aur@aur.archlinux.org/squidservers-bin.git /tmp/aur-repo
          cp PKGBUILD .SRCINFO /tmp/aur-repo/
          cd /tmp/aur-repo
          git config user.name "SquidServers Bot"
          git config user.email "bot@github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.target.outputs.version }}"
          git push