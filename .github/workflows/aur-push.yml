name: Auto-Update and Push to AUR

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-check:
    runs-on: ubuntu-latest
    container: 
      image: archlinux:latest
      options: --user root
    steps:
      - name: Install System Dependencies
        run: |
          pacman -Syu --noconfirm git base-devel openssh curl sudo

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new version
        id: check_version
        run: |
          # 1. Get current version
          OLD_VER=$(grep -oP 'pkgver=\K[0-9.]+' PKGBUILD)
          echo "Local version: $OLD_VER"
          
          # 2. Extract version from Next.js metadata
          # We use a very generic curl and search for the version string pattern
          # that usually appears in their build manifests.
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
          
          # This command looks for the version number following the 'v' in the text
          # It's more likely to bypass Cloudflare's simple bot detection
          NEW_VER=$(curl -sL -A "$USER_AGENT" https://squidservers.com/download | grep -oP 'Latest Version v\K[0-9.]+' | head -1)
          
          # If that fails, we try a broader search for any squidservers_X.X.X_amd64 string
          if [ -z "$NEW_VER" ]; then
             NEW_VER=$(curl -sL -A "$USER_AGENT" https://squidservers.com/download | grep -oP 'squidservers_\K[0-9.]+(?=_amd64)' | head -1)
          fi

          echo "Detected version: '$NEW_VER'"

          if [ -z "$NEW_VER" ]; then
            echo "Error: Cloudflare is still blocking the request."
            echo "Try visiting the site in your browser and check if the version is still 0.6.1"
            exit 1
          fi

          if [ "$OLD_VER" != "$NEW_VER" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VER" >> $GITHUB_OUTPUT
            sed -i "s/pkgver=$OLD_VER/pkgver=$NEW_VER/" PKGBUILD
          else
            echo "No update needed. Site is on $NEW_VER"
          fi

      - name: Update Checksums and .SRCINFO
        if: steps.check_version.outputs.version_changed == 'true'
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder .
          sudo -u builder bash -c "updpkgsums && makepkg --printsrcinfo > .SRCINFO"

      - name: Push to GitHub and AUR
        if: steps.check_version.outputs.version_changed == 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          eval $(ssh-agent -s)
          echo "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
          git config --global user.name "SquidServers Bot"
          git config --global user.email "bot@github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add PKGBUILD .SRCINFO
          git commit -m "Auto-update to ${{ steps.check_version.outputs.new_version }}"
          git push origin main
          git remote add aur ssh://aur@aur.archlinux.org/squidservers-bin.git
          git push aur main:master --force